<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QE CRM</title>
    <style>
        /* ================= CSS STYLING ================= */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .screen { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        
        /* Cards & Layout */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .header h2 { margin: 0; font-size: 1.5em; }
        
        /* Inputs & Buttons */
        label { font-weight: bold; font-size: 0.9em; color: #555; display: block; margin-top: 10px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .logout-btn { background-color: #dc3545; padding: 8px 15px; }
        .logout-btn:hover { background-color: #c82333; }

        /* Filter Section */
        .filter-section { display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #ddd; align-items: center; flex-wrap: wrap;}
        .filter-section input, .filter-section select { margin-bottom: 0; flex: 1; min-width: 200px; }

        /* Table Styling */
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e9ecef; }

        .status-pending { color: #dc3545; font-weight: bold; }
        .status-solved { color: #28a745; font-weight: bold; }
        
        /* Analytics */
        .stat-box { display: flex; justify-content: space-between; background: #eef; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #007bff; font-size: 1.1em;}
        .stat-box span { font-weight: bold; font-size: 1.2em; color: #007bff; }

        /* Toaster */
        .toast { padding: 10px; border-radius: 5px; margin-top: 15px; text-align: center; font-weight: bold; display: none; }

        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
            .filter-section { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card" style="max-width: 400px; margin-top: 50px;">
            <h2 style="text-align: center; color: #343a40;">Admin Login</h2>
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter admin username">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
            <button style="width: 100%; margin-top: 10px;" onclick="login()">Login</button>
            <div id="login-msg" class="toast"></div>
        </div>
    </div>

    <div id="admin-screen" class="screen hidden">
        <div class="header">
            <h2>👨‍💼 Admin Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="admin-grid">
            <div class="card">
                <h3 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">📊 Overview</h3>
                <div id="analytics-box">Loading analytics...</div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">👥 Add New Telecaller</h3>
                <input type="text" id="new-emp-name" placeholder="Full Name (e.g. Rahul Kumar)">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-emp-user" placeholder="Username">
                    <input type="text" id="new-emp-pass" placeholder="Password">
                </div>
                <button style="width: 100%;" onclick="addNewEmployee()">Add Employee</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0;">📋 Student Complaints</h3>
                <button class="btn-success" onclick="exportCSV()">📥 Export CSV</button>
            </div>

            <div class="filter-section">
                <input type="text" id="search-box" placeholder="🔍 Search Name or Mobile..." onkeyup="applyFilters()">
                
                <select id="filter-category" onchange="applyFilters()">
                    <option value="All">All Categories</option>
                    <option value="Online Course Related">Online Course Related</option>
                    <option value="Online Test Series Related">Online Test Series Related</option>
                    <option value="Offline Test Series Related">Offline Test Series Related</option>
                    <option value="Notes Related">Notes Related</option>
                    <option value="App Feedback">App Feedback</option>
                    <option value="Teacher Feedback">Teacher Feedback</option>
                    <option value="Others">Others</option>
                </select>

                <select id="filter-status" onchange="applyFilters()">
                    <option value="All">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Solved">Solved</option>
                </select>
            </div>
            
            <div class="table-responsive">
                <table id="complaints-table">
                    <thead>
                        <tr>
                            <th width="10%">Date & ID</th>
                            <th width="15%">Student Info</th>
                            <th width="30%">Problem & Issue</th>
                            <th width="20%">Telecaller Response</th>
                            <th width="10%">Status</th>
                            <th width="15%">Admin Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align:center;">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🛑 IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbyI9FRnm9GUhhjKY7Er__pdONW4FqSSc7LBdVQ6MHTSqndwBowM8Krl36Nj12l1-F0tjA/exec"; 
        
        let currentUser = null;
        let allComplaintsCache = [];
        let employeesMap = {}; // To store Employee ID to Name mapping

        window.onload = () => {
            const savedUser = localStorage.getItem("qei_admin_user");
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                if(currentUser.role === "admin") showAdminScreen();
                else logout();
            }
        };

        async function apiCall(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                return { success: false, message: "Network error." };
            }
        }

        async function login() {
            const user = document.getElementById("login-username").value;
            const pass = document.getElementById("login-password").value;
            const msgBox = document.getElementById("login-msg");
            const btn = document.querySelector("#login-screen button");
            
            if(!user || !pass) return showMsg(msgBox, "Please enter credentials", "red");

            showMsg(msgBox, "Verifying admin...", "blue");
            btn.disabled = true;

            const res = await apiCall({ action: "login", username: user, password: pass });
            
            if (res.success && res.user.role === "admin") {
                currentUser = res.user;
                localStorage.setItem("qei_admin_user", JSON.stringify(currentUser));
                showAdminScreen();
            } else {
                showMsg(msgBox, res.user?.role !== "admin" ? "Access Denied. Admins only." : "Invalid credentials!", "red");
            }
            btn.disabled = false;
        }

        function showMsg(element, text, color) {
            element.innerText = text;
            element.style.display = "block";
            element.style.color = color;
            element.style.backgroundColor = color === 'red' ? '#f8d7da' : '#d4edda';
        }

        function logout() {
            localStorage.removeItem("qei_admin_user");
            currentUser = null;
            document.getElementById("admin-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
        }

        function showAdminScreen() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("admin-screen").classList.remove("hidden");
            loadDashboardData();
        }

        // --- FETCH & DISPLAY DATA ---
        async function loadDashboardData() {
            const tbody = document.querySelector("#complaints-table tbody");
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Fetching latest data from database...</td></tr>`;
            
            const res = await apiCall({ action: "getAdminData" });
            
            if (res.success) {
                allComplaintsCache = res.complaints.slice().reverse(); // Reverse to show newest first
                
                // Create map for Employee Names
                employeesMap = {};
                res.employees.forEach(emp => {
                    employeesMap[emp.employeeId] = emp.name;
                });

                renderAnalytics(allComplaintsCache);
                renderTable(allComplaintsCache); // Initial render
            } else {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Failed to load data.</td></tr>`;
            }
        }

        function renderAnalytics(complaints) {
            let total = complaints.length;
            let solved = complaints.filter(c => c.status === "Solved").length;
            let pending = total - solved;

            document.getElementById("analytics-box").innerHTML = `
                <div class="stat-box">Total Complaints: <span style="color:#333">${total}</span></div>
                <div class="stat-box" style="border-left-color: #dc3545;">Pending Complaints: <span style="color:#dc3545">${pending}</span></div>
                <div class="stat-box" style="border-left-color: #28a745;">Solved Complaints: <span style="color:#28a745">${solved}</span></div>
            `;
        }

        // --- FILTER & SEARCH LOGIC ---
        function applyFilters() {
            const searchText = document.getElementById("search-box").value.toLowerCase();
            const category = document.getElementById("filter-category").value;
            const status = document.getElementById("filter-status").value;

            const filteredData = allComplaintsCache.filter(c => {
                const matchSearch = c.mobile.includes(searchText) || c.studentName.toLowerCase().includes(searchText);
                const matchCategory = category === "All" ? true : c.problemType === category;
                const matchStatus = status === "All" ? true : c.status === status;
                
                return matchSearch && matchCategory && matchStatus;
            });

            renderTable(filteredData);
        }

        function renderTable(complaints) {
            const tbody = document.querySelector("#complaints-table tbody");
            tbody.innerHTML = "";

            if (complaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px;">No matching records found.</td></tr>`;
                return;
            }

            complaints.forEach(c => {
                let statusClass = c.status === "Pending" ? "status-pending" : "status-solved";
                
                // 1. Clean Date (e.g. 25 Mar, 2026)
                let cleanDate = c.date;
                try {
                    let d = new Date(c.date);
                    if(!isNaN(d)) cleanDate = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                } catch(e) {}

                // 2. Short ID (Last 3 Digits)
                let shortId = c.complaintId.slice(-3);

                // 3. Employee Name instead of Code
                let empName = employeesMap[c.employeeId] || "Unknown Telecaller";

                let actionHTML = "";
                if (c.status === "Pending") {
                    actionHTML = `
                        <input type="text" id="admin-cmt-${c.complaintId}" placeholder="Write solution (optional)..." style="margin-bottom:5px; padding:6px; font-size:12px;">
                        <button class="btn-success" onclick="markSolved('${c.complaintId}')" style="padding:6px 10px; font-size:12px; width:100%;">Mark as Solved</button>
                    `;
                } else {
                    let showComment = c.adminComment ? c.adminComment : "Solved without comment";
                    actionHTML = `
                        <div style="background:#e8f5e9; padding:8px; border-radius:4px; font-size:0.9em;">
                            <strong>Your Reply:</strong> ${showComment}
                        </div>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:0.85em; color:#555;"><b>${cleanDate}</b><br><small style="color:gray">ID: ${shortId}</small></td>
                        <td>
                            <b>${c.studentName}</b><br>
                            📞 ${c.mobile}
                        </td>
                        <td>
                            <span style="background:#e9ecef; padding:2px 6px; border-radius:3px; font-size:0.85em; font-weight:bold;">${c.problemType}</span>
                            <p style="margin:5px 0 0 0; font-size:0.95em;">${c.issue}</p>
                        </td>
                        <td style="font-size:0.95em; color:#444;">
                            ${c.employeeResponse}<br>
                            <span style="color:#007bff; font-size:0.85em; font-weight:bold;">(By: ${empName})</span>
                        </td>
                        <td class="${statusClass}">${c.status}</td>
                        <td>${actionHTML}</td>
                    </tr>
                `;
            });
        }

        // --- ADMIN ACTIONS ---
        async function markSolved(id) {
            const commentInput = document.getElementById(`admin-cmt-${id}`);
            // If empty, set default text
            const comment = commentInput.value.trim() || "Solved by Admin";

            commentInput.disabled = true;
            const btn = commentInput.nextElementSibling;
            btn.innerText = "Saving...";
            btn.disabled = true;

            const res = await apiCall({ action: "updateComplaint", complaintId: id, adminComment: comment });
            
            if(res.success) {
                loadDashboardData(); // Reload table data
            } else {
                alert("Error updating status.");
                commentInput.disabled = false;
                btn.innerText = "Mark as Solved";
                btn.disabled = false;
            }
        }

        async function addNewEmployee() {
            const name = document.getElementById("new-emp-name").value;
            const user = document.getElementById("new-emp-user").value;
            const pass = document.getElementById("new-emp-pass").value;

            if(!name || !user || !pass) return alert("Please fill all employee details.");

            const btn = document.querySelector(".admin-grid .card:nth-child(2) button");
            btn.innerText = "Adding...";
            btn.disabled = true;

            const res = await apiCall({ action: "addEmployee", employee: { name, username: user, password: pass } });
            
            if(res.success) {
                alert(`Employee ${name} added successfully!`);
                document.getElementById("new-emp-name").value = "";
                document.getElementById("new-emp-user").value = "";
                document.getElementById("new-emp-pass").value = "";
                // Refresh data to update employeesMap
                loadDashboardData();
            } else {
                alert("Failed to add employee.");
            }
            btn.innerText = "Add Employee";
            btn.disabled = false;
        }

        // --- EXPORT TO CSV ---
        function exportCSV() {
            if (allComplaintsCache.length === 0) return alert("No data available to export.");
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Complaint ID,Date,Mobile,Student Name,Problem Type,Issue Description,Telecaller Response,Telecaller Name,Status,Admin Comment\n";
            
            allComplaintsCache.forEach(c => {
                let cleanDate = c.date;
                try { let d = new Date(c.date); if(!isNaN(d)) cleanDate = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); } catch(e) {}
                
                let empName = employeesMap[c.employeeId] || "Unknown";
                
                let issue = c.issue ? c.issue.replace(/"/g, '""').replace(/\n/g, ' ') : "";
                let empResp = c.employeeResponse ? c.employeeResponse.replace(/"/g, '""').replace(/\n/g, ' ') : "";
                let adminCmt = c.adminComment ? c.adminComment.replace(/"/g, '""').replace(/\n/g, ' ') : "";

                let row = `"${c.complaintId}","${cleanDate}","${c.mobile}","${c.studentName}","${c.problemType}","${issue}","${empResp}","${empName}","${c.status}","${adminCmt}"`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `QEI_Complaints_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
