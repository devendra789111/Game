<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quality Education CRM</title>
    <style>
        /* ================= CSS STYLING ================= */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .screen { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .error { color: red; font-size: 0.9em; text-align: center; }
        
        /* Cards & Layout */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .header h2 { margin: 0; font-size: 1.5em; }
        
        /* Inputs & Buttons */
        label { font-weight: bold; font-size: 0.9em; color: #555; display: block; margin-top: 10px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        
        .logout-btn { background-color: #dc3545; padding: 8px 15px; }
        .logout-btn:hover { background-color: #c82333; }

        /* Table Styling */
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e9ecef; }

        .status-pending { color: #dc3545; font-weight: bold; }
        .status-solved { color: #28a745; font-weight: bold; }

        /* Analytics Box */
        .stat-box { display: flex; justify-content: space-between; background: #eef; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #007bff; font-size: 1.1em;}
        .stat-box span { font-weight: bold; font-size: 1.2em; color: #007bff; }

        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card" style="max-width: 400px; margin-top: 50px;">
            <h2 style="text-align: center; color: #343a40;">Admin Login</h2>
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter admin username">
            
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
            
            <button style="width: 100%; margin-top: 10px;" onclick="login()">Login</button>
            <p id="login-msg" class="error"></p>
        </div>
    </div>

    <div id="admin-screen" class="screen hidden">
        <div class="header">
            <h2>👨‍💼 Admin Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="admin-grid">
            <div class="card">
                <h3 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">📊 Overview</h3>
                <div id="analytics-box">
                    <p>Loading analytics...</p>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">👥 Add New Telecaller</h3>
                <input type="text" id="new-emp-name" placeholder="Full Name (e.g. Rahul Kumar)">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-emp-user" placeholder="Username">
                    <input type="text" id="new-emp-pass" placeholder="Password">
                </div>
                <button style="width: 100%;" onclick="addNewEmployee()">Add Employee</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0;">📋 All Student Complaints</h3>
                <button class="btn-success" onclick="exportCSV()">📥 Download CSV</button>
            </div>
            
            <div class="table-responsive">
                <table id="complaints-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Student Info</th>
                            <th>Problem & Issue</th>
                            <th>Telecaller Response</th>
                            <th>Status</th>
                            <th>Admin Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align:center;">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🛑 IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbzzS-eoDC-RxUUo5fmaH15OU5tCLzeBUADRpvZkczmg5IsK6XnpoXzr6pJ6wTRBG_4kew/exec"; 
        
        let currentUser = null;
        let allComplaintsCache = [];

        window.onload = () => {
            const savedUser = localStorage.getItem("qei_admin_user");
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                if(currentUser.role === "admin") {
                    showAdminScreen();
                } else {
                    logout();
                }
            }
        };

        // --- API HELPER ---
        async function apiCall(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { success: false, message: "Network error." };
            }
        }

        // --- LOGIN & LOGOUT ---
        async function login() {
            const user = document.getElementById("login-username").value;
            const pass = document.getElementById("login-password").value;
            const msgBox = document.getElementById("login-msg");
            const btn = document.querySelector("#login-screen button");
            
            if(!user || !pass) return msgBox.innerText = "Please enter credentials.";

            msgBox.style.color = "blue";
            msgBox.innerText = "Verifying admin...";
            btn.disabled = true;

            const res = await apiCall({ action: "login", username: user, password: pass });
            
            if (res.success && res.user.role === "admin") {
                currentUser = res.user;
                localStorage.setItem("qei_admin_user", JSON.stringify(currentUser));
                showAdminScreen();
            } else {
                msgBox.style.color = "red";
                msgBox.innerText = res.user?.role !== "admin" ? "Access Denied. Admins only." : (res.message || "Invalid credentials!");
            }
            btn.disabled = false;
        }

        function logout() {
            localStorage.removeItem("qei_admin_user");
            currentUser = null;
            document.getElementById("admin-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("login-msg").innerText = "";
            document.getElementById("login-username").value = "";
            document.getElementById("login-password").value = "";
        }

        function showAdminScreen() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("admin-screen").classList.remove("hidden");
            loadDashboardData();
        }

        // --- FETCH & DISPLAY DATA ---
        async function loadDashboardData() {
            const tbody = document.querySelector("#complaints-table tbody");
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Fetching latest data from Google Sheets...</td></tr>`;
            
            const res = await apiCall({ action: "getAdminData" });
            
            if (res.success) {
                allComplaintsCache = res.complaints;
                renderAnalytics(res.complaints);
                renderTable(res.complaints);
            } else {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Failed to load data.</td></tr>`;
            }
        }

        function renderAnalytics(complaints) {
            let total = complaints.length;
            let solved = complaints.filter(c => c.status === "Solved").length;
            let pending = total - solved;

            document.getElementById("analytics-box").innerHTML = `
                <div class="stat-box">Total Complaints: <span style="color:#333">${total}</span></div>
                <div class="stat-box" style="border-left-color: #dc3545;">Pending Complaints: <span style="color:#dc3545">${pending}</span></div>
                <div class="stat-box" style="border-left-color: #28a745;">Solved Complaints: <span style="color:#28a745">${solved}</span></div>
            `;
        }

        function renderTable(complaints) {
            const tbody = document.querySelector("#complaints-table tbody");
            tbody.innerHTML = "";

            if (complaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No complaints found.</td></tr>`;
                return;
            }

            // Show newest records first
            complaints.slice().reverse().forEach(c => {
                let statusClass = c.status === "Pending" ? "status-pending" : "status-solved";
                
                let actionHTML = "";
                if (c.status === "Pending") {
                    actionHTML = `
                        <input type="text" id="admin-cmt-${c.complaintId}" placeholder="Write solution..." style="margin-bottom:5px; padding:6px; font-size:12px;">
                        <button class="btn-success" onclick="markSolved('${c.complaintId}')" style="padding:6px 10px; font-size:12px; width:100%;">Mark as Solved</button>
                    `;
                } else {
                    actionHTML = `
                        <div style="background:#e8f5e9; padding:8px; border-radius:4px; font-size:0.9em;">
                            <strong>Your Reply:</strong> ${c.adminComment}<br>
                            <small style="color:gray;">Solved on: ${c.solvedDate}</small>
                        </div>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:0.85em; color:gray;">${c.date}<br><b>ID:</b> ${c.complaintId}</td>
                        <td>
                            <b>${c.studentName}</b><br>
                            📞 ${c.mobile}
                        </td>
                        <td>
                            <span style="background:#e9ecef; padding:2px 6px; border-radius:3px; font-size:0.85em;">${c.problemType}</span>
                            <p style="margin:5px 0 0 0; font-size:0.95em;">${c.issue}</p>
                        </td>
                        <td style="font-size:0.95em; color:#444;">${c.employeeResponse}<br><small>(By: ${c.employeeId})</small></td>
                        <td class="${statusClass}">${c.status}</td>
                        <td>${actionHTML}</td>
                    </tr>
                `;
            });
        }

        // --- ADMIN ACTIONS ---
        async function markSolved(id) {
            const commentInput = document.getElementById(`admin-cmt-${id}`);
            const comment = commentInput.value;
            
            if(!comment) {
                alert("Please write an Admin Comment/Solution before marking as solved.");
                return;
            }

            commentInput.disabled = true;
            const res = await apiCall({ action: "updateComplaint", complaintId: id, adminComment: comment });
            
            if(res.success) {
                loadDashboardData(); // Reload table
            } else {
                alert("Error updating status.");
                commentInput.disabled = false;
            }
        }

        async function addNewEmployee() {
            const name = document.getElementById("new-emp-name").value;
            const user = document.getElementById("new-emp-user").value;
            const pass = document.getElementById("new-emp-pass").value;

            if(!name || !user || !pass) {
                alert("Please fill all employee details.");
                return;
            }

            const res = await apiCall({ action: "addEmployee", employee: { name, username: user, password: pass } });
            
            if(res.success) {
                alert(`Employee ${name} added successfully!`);
                document.getElementById("new-emp-name").value = "";
                document.getElementById("new-emp-user").value = "";
                document.getElementById("new-emp-pass").value = "";
            } else {
                alert("Failed to add employee.");
            }
        }

        // --- EXPORT TO CSV ---
        function exportCSV() {
            if (allComplaintsCache.length === 0) return alert("No data available to export.");
            
            let csvContent = "data:text/csv;charset=utf-8,";
            // CSV Headers
            csvContent += "Complaint ID,Date,Mobile,Student Name,Problem Type,Issue Description,Telecaller Response,Telecaller ID,Status,Admin Comment,Solved Date\n";
            
            allComplaintsCache.forEach(c => {
                // Escape quotes and commas
                let issue = c.issue ? c.issue.replace(/"/g, '""').replace(/\n/g, ' ') : "";
                let empResp = c.employeeResponse ? c.employeeResponse.replace(/"/g, '""').replace(/\n/g, ' ') : "";
                let adminCmt = c.adminComment ? c.adminComment.replace(/"/g, '""').replace(/\n/g, ' ') : "";

                let row = `"${c.complaintId}","${c.date}","${c.mobile}","${c.studentName}","${c.problemType}","${issue}","${empResp}","${c.employeeId}","${c.status}","${adminCmt}","${c.solvedDate || ''}"`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `QEI_Complaints_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
