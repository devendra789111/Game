<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        .header { background: #1a237e; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .live-time { font-size: 24px; font-weight: bold; margin-top: 5px; color: #ffeb3b; }
        
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { padding: 10px; width: 40%; margin: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        button { padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-in { background-color: #4CAF50; } .btn-in:hover { background-color: #45a049; }
        .btn-out { background-color: #f44336; } .btn-out:hover { background-color: #d32f2f; }
        .btn-train { background-color: #9C27B0; } .btn-train:hover { background-color: #7B1FA2; }
        .btn-break { background-color: #FF9800; } .btn-break:hover { background-color: #F57C00; }
        .btn-leave { background-color: #00BCD4; } .btn-leave:hover { background-color: #0097A7; }
        .btn-export { background-color: #607D8B; margin-top: 20px;}
        
        #cameraBox { display: none; margin: 15px auto; }
        video { width: 100%; max-width: 300px; border-radius: 10px; border: 3px solid #1a237e; }
        canvas { display: none; }
        
        .status-box { margin: 20px 0; padding: 15px; background: #f1f8e9; border: 1px solid #c5e1a5; border-radius: 8px; font-size: 18px; }
        .timers { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; margin-top: 10px; }
        .timer-work { color: #2E7D32; } .timer-train { color: #6A1B9A; } .timer-break { color: #E65100; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #1a237e; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏢 Quality Education Attendance</h1>
        <div id="liveDateTime" class="live-time">लोड हो रहा है...</div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="empName" placeholder="कर्मचारी का नाम" required>
            <input type="text" id="empId" placeholder="एम्प्लॉई ID" required>
        </div>

        <div id="cameraBox">
            <p style="color:red; font-weight:bold;">कृपया कैमरे में देखकर अपनी पहचान कन्फर्म करें</p>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <br>
            <button class="btn-in" id="captureBtn" onclick="takePhotoAndPunch()">सेल्फी लें और कन्फर्म करें</button>
        </div>

        <div class="status-box" id="statusBox">
            <strong>स्टेटस:</strong> <span id="currentStatus">पंच-इन का इंतज़ार...</span><br>
            <small id="geoStatus">लोकेशन: 50 मीटर ट्रैकिंग स्टैंडबाय</small>
            
            <div class="timers">
                <div class="timer-work">Working: <span id="workTimer">00:00:00</span></div>
                <div class="timer-train" style="display:none;" id="trainTimerBox">Training: <span id="trainTimer">00:00:00</span></div>
                <div class="timer-break" style="display:none;" id="breakTimerBox">Break: <span id="breakTimer">00:00:00</span></div>
            </div>
        </div>

        <div class="btn-grid">
            <button class="btn-in" onclick="startCameraProcess('in')">Punch In</button>
            <button class="btn-out" onclick="startCameraProcess('out')">Punch Out</button>
            <button class="btn-train" id="btnTrain" onclick="toggleTraining()">Start Training</button>
            <button class="btn-break" id="btnBreak" onclick="toggleBreak()">Start Break ☕</button>
            <button class="btn-leave" onclick="markLeave()">Mark Leave</button>
        </div>

        <h3>आज की एंट्रीज (Daily Log)</h3>
        <table>
            <thead>
                <tr>
                    <th>नाम</th>
                    <th>ID</th>
                    <th>समय</th>
                    <th>प्रकार</th>
                    <th>स्टेटस</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                </tbody>
        </table>

        <button class="btn-export" onclick="exportData()">PDF / Excel डाउनलोड करें</button>
    </div>

    <script>
        // --- कॉन्फ़िगरेशन (Admin Settings) ---
        const TRAINING_PASSWORD = "123"; // ट्रेनिंग मोड का पासवर्ड
        const WEEKLY_OFF_DAY = 1; // 1 = Monday, 0 = Sunday
        const HOLIDAYS = ["2026-03-25", "2026-11-10"]; // होली, दिवाली आदि की तारीखें (YYYY-MM-DD)

        // --- स्टेट वेरिएबल्स (State) ---
        let state = {
            isPunchedIn: false,
            mode: "regular", // regular, training, break
            actionType: "", // in or out
            workSeconds: 0, trainSeconds: 0, breakSeconds: 0,
            baseLat: null, baseLng: null, isWithin50m: true
        };
        let intervals = { work: null, train: null, break: null, geo: null };
        let stream = null;

        // --- 1. लाइव टाइमर (Live Server Time Simulation) ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' };
            document.getElementById('liveDateTime').innerText = now.toLocaleString('hi-IN', options);
            
            // वीकली ऑफ या हॉलिडे चेक
            if(now.getDay() === WEEKLY_OFF_DAY) {
                document.getElementById('currentStatus').innerText = "आज वीकली ऑफ है!";
            }
        }
        setInterval(updateDateTime, 1000);

        // --- 2. कैमरा और सेल्फी सिस्टम (Smart Camera) ---
        async function startCameraProcess(type) {
            let name = document.getElementById("empName").value;
            let id = document.getElementById("empId").value;
            
            if(!name || !id) return alert("पहले नाम और एम्प्लॉई ID भरें!");
            if(type === 'in' && state.isPunchedIn) return alert("आप पहले ही पंच-इन कर चुके हैं!");
            if(type === 'out' && !state.isPunchedIn) return alert("पहले पंच-इन करें!");

            state.actionType = type;
            document.getElementById("cameraBox").style.display = "block";
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById("video").srcObject = stream;
            } catch (err) {
                alert("कैमरा एक्सेस नहीं मिला! सेल्फी अनिवार्य है।");
            }
        }

        function takePhotoAndPunch() {
            // (यहाँ फोटो खींचने का लॉजिक canvas से होगा, अभी UI के लिए बंद कर रहे हैं)
            document.getElementById("cameraBox").style.display = "none";
            if(stream) stream.getTracks().forEach(track => track.stop()); // कैमरा बंद करें
            
            if(state.actionType === 'in') processPunchIn();
            else processPunchOut();
        }

        // --- 3. जियो-फेंसिंग और पंच-इन (Geo-fencing) ---
        function processPunchIn() {
            if (!navigator.geolocation) return alert("लोकेशन सपोर्ट नहीं है!");
            
            document.getElementById('geoStatus').innerText = "लोकेशन चेक की जा रही है...";
            navigator.geolocation.getCurrentPosition((pos) => {
                state.baseLat = pos.coords.latitude;
                state.baseLng = pos.coords.longitude;
                state.isPunchedIn = true;
                state.mode = "regular";
                
                updateStatus("Present", "लोकेशन सेट (50m ज़ोन एक्टिव)");
                startInterval('work');
                startGeoTracking();
                logEntry("Punch In", "Present");
            }, () => { alert("लोकेशन परमिशन अनिवार्य है!"); }, { enableHighAccuracy: true });
        }

        function processPunchOut() {
            state.isPunchedIn = false;
            stopAllIntervals();
            updateStatus("पंच-आउट हो गया", "शिफ्ट समाप्त");
            logEntry("Punch Out", "Shift Ended");
        }

        function startGeoTracking() {
            intervals.geo = navigator.geolocation.watchPosition((pos) => {
                if(state.mode !== "regular") return; // ट्रेनिंग/ब्रेक में 50m रूल लागू नहीं

                let dist = calculateDistance(state.baseLat, state.baseLng, pos.coords.latitude, pos.coords.longitude);
                if(dist <= 50) {
                    if(!state.isWithin50m) { state.isWithin50m = true; startInterval('work'); updateStatus("Present", "आप वर्किंग ज़ोन में हैं"); }
                } else {
                    if(state.isWithin50m) { state.isWithin50m = false; stopInterval('work'); updateStatus("Alert: ज़ोन से बाहर!", "वर्किंग टाइम रुका हुआ है", "red"); }
                }
            }, null, { enableHighAccuracy: true });
        }

        // --- 4. ट्रेनिंग और ब्रेक (Training & Break) ---
        function toggleTraining() {
            if(!state.isPunchedIn) return alert("पहले पंच-इन करें!");
            let btn = document.getElementById("btnTrain");
            
            if(state.mode !== "training") {
                let pass = prompt("ट्रेनिंग शुरू करने के लिए एडमिन पासवर्ड डालें:");
                if(pass !== TRAINING_PASSWORD) return alert("गलत पासवर्ड!");
                
                state.mode = "training";
                stopInterval('work'); stopInterval('break'); startInterval('train');
                document.getElementById('trainTimerBox').style.display = "block";
                btn.innerText = "End Training";
                updateStatus("On Official Duty", "50m जियो-फेंसिंग बाईपास की गई");
                logEntry("Training Started", "Official Duty");
            } else {
                state.mode = "regular";
                stopInterval('train'); startInterval('work');
                btn.innerText = "Start Training";
                updateStatus("Present", "वापस वर्किंग ज़ोन में");
                logEntry("Training Ended", "Back to Work");
            }
        }

        function toggleBreak() {
            if(!state.isPunchedIn) return alert("पहले पंच-इन करें!");
            let btn = document.getElementById("btnBreak");
            
            if(state.mode !== "break") {
                state.mode = "break";
                stopInterval('work'); stopInterval('train'); startInterval('break');
                document.getElementById('breakTimerBox').style.display = "block";
                btn.innerText = "End Break ☕";
                updateStatus("On Break ☕", "वर्किंग टाइम रुका हुआ है");
                logEntry("Break Started", "Break");
            } else {
                state.mode = "regular";
                stopInterval('break'); startInterval('work');
                btn.innerText = "Start Break ☕";
                updateStatus("Present", "वापस काम पर");
                logEntry("Break Ended", "Back to Work");
            }
        }

        // --- 5. यूटिलिटी फंक्शन्स (Timers, Distance, Logs) ---
        function startInterval(type) {
            if(type === 'work') intervals.work = setInterval(() => { state.workSeconds++; updateDisplay('workTimer', state.workSeconds); }, 1000);
            if(type === 'train') intervals.train = setInterval(() => { state.trainSeconds++; updateDisplay('trainTimer', state.trainSeconds); }, 1000);
            if(type === 'break') intervals.break = setInterval(() => { state.breakSeconds++; updateDisplay('breakTimer', state.breakSeconds); }, 1000);
        }
        function stopInterval(type) { clearInterval(intervals[type]); }
        function stopAllIntervals() { stopInterval('work'); stopInterval('train'); stopInterval('break'); if(intervals.geo) navigator.geolocation.clearWatch(intervals.geo); }
        
        function updateDisplay(elementId, totalSeconds) {
            let hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            let mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            let secs = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById(elementId).innerText = `${hrs}:${mins}:${secs}`;
        }

        function updateStatus(mainText, subText, color = "#000") {
            document.getElementById('currentStatus').innerHTML = `<span style="color:${color}">${mainText}</span>`;
            document.getElementById('geoStatus').innerText = subText;
        }

        function logEntry(type, statusText) {
            let name = document.getElementById("empName").value;
            let id = document.getElementById("empId").value;
            let time = new Date().toLocaleTimeString('hi-IN');
            
            let row = `<tr><td>${name}</td><td>${id}</td><td>${time}</td><td>${type}</td><td>${statusText}</td></tr>`;
            document.getElementById("logTableBody").innerHTML += row;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function markLeave() {
            let date = prompt("छुट्टी की तारीख दर्ज करें (YYYY-MM-DD):");
            let reason = prompt("छुट्टी का कारण:");
            if(date && reason) { logEntry(`Leave: ${date}`, reason); alert("छुट्टी मार्क कर दी गई है।"); }
        }

        function exportData() {
            let pass = prompt("डाउनलोड करने के लिए एडमिन पासवर्ड डालें:");
            if(pass === "admin123") {
                alert("मंथली PDF और Excel डाउनलोड हो रही है... (नोट: असली PDF में सेल्फी और पक्के डेटाबेस के लिए बैकएंड/सर्वर की आवश्यकता होगी)");
                window.print(); // बेसिक पीडीएफ/प्रिंट के लिए
            } else {
                alert("पासवर्ड गलत है!");
            }
        }
    </script>
</body>
</html>
