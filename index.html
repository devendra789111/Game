<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        
        .header { background: #1a237e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 5px 0; font-size: 22px; }
        .live-time { font-size: 16px; font-weight: bold; color: #ffeb3b; }
        
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 1100px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* इनपुट बॉक्स को हाईलाइट और बड़ा किया गया है */
        .input-group { margin-bottom: 20px; background: #f5f5f5; padding: 15px; border-radius: 8px; border: 2px solid #ddd; }
        input[type="text"] { padding: 12px; width: 30%; margin: 5px; border: 2px solid #1a237e; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; }
        input[type="text"]::placeholder { font-weight: normal; color: #888; }

        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; }
        button:hover { filter: brightness(0.9); }
        
        .btn-in { background-color: #4CAF50; } 
        .btn-out { background-color: #f44336; } 
        .btn-train-start { background-color: #9C27B0; } .btn-train-end { background-color: #7B1FA2; }
        .btn-break-start { background-color: #FF9800; } .btn-break-end { background-color: #F57C00; }
        .btn-leave { background-color: #E91E63; }
        
        /* सेल्फी पॉप-अप */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; width: 320px; }
        video { width: 100%; border-radius: 8px; border: 3px solid #1a237e; margin-bottom: 10px; }
        canvas { display: none; }

        /* स्टेटस बॉक्स */
        .status-box { margin: 15px auto; padding: 10px; background: #e3f2fd; border: 2px solid #90caf9; border-radius: 6px; font-size: 16px; font-weight: bold; color: #0d47a1; max-width: 500px; }
        .out-of-zone { background: #ffebee !important; border-color: #ef5350 !important; color: #c62828 !important; }

        /* टेबल डिज़ाइन */
        #exportArea { margin-top: 20px; background: white; padding: 10px; }
        .report-header { display: none; text-align: center; font-size: 20px; margin-bottom: 15px; color: #1a237e; font-weight: bold; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; vertical-align: middle; }
        th { background-color: #1a237e; color: white; }
        
        .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; color: white; margin-top: 3px; }
        .badge-break { background-color: #F57C00; }
        .badge-train { background-color: #7B1FA2; }
        
        .export-btns { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn-pdf { background-color: #D32F2F; padding: 10px 20px; }
        .btn-excel { background-color: #2E7D32; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏢 Quality Education Attendance Kiosk</h2>
        <div id="liveDateTime" class="live-time">लोड हो रहा है...</div>
    </div>

    <div class="container">
        <div class="input-group">
            <p style="margin: 0 0 10px 0; font-size: 14px; color: #555;">अपना नाम और ID दर्ज करें और बटन दबाएं:</p>
            <input type="text" id="empName" placeholder="कर्मचारी का नाम">
            <input type="text" id="empId" placeholder="एम्प्लॉई ID">
        </div>

        <div class="status-box" id="statusBox">
            डिवाइस लोकेशन: <span id="geoText">चेक की जा रही है...</span>
        </div>

        <div class="btn-grid">
            <button class="btn-in" onclick="initPunchIn()">Punch In</button>
            <button class="btn-out" onclick="initPunchOut()">Punch Out</button>
            <button class="btn-break-start" onclick="actionBtn('break')">Start Break ☕</button>
            <button class="btn-break-end" onclick="actionBtn('work')">End Break</button>
            <button class="btn-train-start" onclick="startTraining()">Start Training</button>
            <button class="btn-train-end" onclick="actionBtn('work')">End Training</button>
            <button class="btn-leave" onclick="markLeave()">Mark Leave/Holiday</button>
        </div>

        <div id="exportArea">
            <div class="report-header" id="pdfMonthHeader">Attendance Report</div>
            <div style="overflow-x: auto;">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>नाम</th>
                            <th>स्टेटस</th>
                            <th>In Time</th>
                            <th>Out Time</th>
                            <th>Break Time</th>
                            <th>Train Time</th>
                            <th>Total Hrs</th>
                            <th>In Selfie</th>
                            <th>Out Selfie</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <tr><td colspan="10">कोई डेटा उपलब्ध नहीं है</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="export-btns">
            <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
            <button class="btn-excel" onclick="downloadExcel()">Download Excel</button>
        </div>
    </div>

    <div id="selfieModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; color:#1a237e;">📍 लोकेशन कन्फर्म, सेल्फी लें</h3>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <button class="btn-in" style="width:100%;" onclick="captureAndProceed()">सेल्फी कैप्चर करें</button>
            <button style="width:100%; margin-top:10px; background:#aaa;" onclick="document.getElementById('selfieModal').style.display='none'; if(stream) stream.getTracks().forEach(t=>t.stop());">रद्द करें</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        let stream = null;
        let globalTimer = null;
        let pendingAction = ""; // 'in' या 'out'
        let pendingId = "";
        
        let todayDate = new Date().toLocaleDateString('en-IN');
        let currentMonthName = new Date().toLocaleString('en-IN', { month: 'long', year: 'numeric' });
        document.getElementById('pdfMonthHeader').innerText = `Attendance Report - ${currentMonthName}`;

        // मल्टीपल एम्प्लॉइज का डेटाबेस (Object)
        let attendanceDb = JSON.parse(localStorage.getItem(`attDB_${todayDate}`)) || {};
        
        // बेस लोकेशन (डिवाइस की फिक्स जगह)
        let deviceBaseLat = localStorage.getItem('deviceBaseLat');
        let deviceBaseLng = localStorage.getItem('deviceBaseLng');
        let isDeviceWithin50m = false;

        window.onload = () => {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            renderTable();
            startDeviceGeoTracking();
            startMasterTimer();
        };

        function updateDateTime() {
            document.getElementById('liveDateTime').innerText = new Date().toLocaleString('hi-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' });
        }

        function getInputs() {
            let name = document.getElementById("empName").value.trim();
            let id = document.getElementById("empId").value.trim();
            return { name, id };
        }

        function clearInputs() {
            document.getElementById("empName").value = "";
            document.getElementById("empId").value = "";
        }

        // --- 1. पंच इन ---
        function initPunchIn() {
            let { name, id } = getInputs();
            if(!name || !id) return alert("अपना नाम और ID दर्ज करें!");
            if(attendanceDb[id]) return alert("इस ID से आज का पंच-इन पहले ही हो चुका है!");

            pendingAction = "in";
            pendingId = id;
            document.getElementById('modalTitle').innerText = "पंच-इन: सेल्फी कैप्चर करें";
            openCamera();
        }

        // --- 2. एक्शन बटन्स (ब्रेक, काम पर वापस) ---
        function actionBtn(mode) {
            let { id } = getInputs();
            if(!id) return alert("ID दर्ज करें!");
            if(!attendanceDb[id]) return alert("इस ID से पंच-इन नहीं हुआ है!");
            if(attendanceDb[id].isPunchedOut) return alert("आपकी शिफ्ट समाप्त हो चुकी है!");

            attendanceDb[id].mode = mode;
            saveData(); renderTable(); clearInputs();
            alert(`स्टेटस अपडेट हो गया!`);
        }

        // --- 3. ट्रेनिंग मोड ---
        function startTraining() {
            let { id } = getInputs();
            if(!id) return alert("ID दर्ज करें!");
            if(!attendanceDb[id]) return alert("पहले पंच-इन करें!");
            if(attendanceDb[id].isPunchedOut) return alert("शिफ्ट समाप्त हो चुकी है!");

            let pass = prompt("ट्रेनिंग शुरू करने के लिए एडमिन पासवर्ड डालें:");
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");
            
            attendanceDb[id].mode = "train";
            saveData(); renderTable(); clearInputs();
            alert("ट्रेनिंग मोड चालू!");
        }

        // --- 4. पंच आउट ---
        function initPunchOut() {
            let { id } = getInputs();
            if(!id) return alert("ID दर्ज करें!");
            if(!attendanceDb[id]) return alert("पहले पंच-इन करें!");
            if(attendanceDb[id].isPunchedOut) return alert("आप पहले ही पंच-आउट कर चुके हैं!");
            if(!isDeviceWithin50m) return alert("अलर्ट: आप 50 मीटर ज़ोन से बाहर हैं! पंच-आउट केवल वर्किंग ज़ोन से ही होगा।");

            pendingAction = "out";
            pendingId = id;
            document.getElementById('modalTitle').innerText = "पंच-आउट: सेल्फी कैप्चर करें";
            openCamera();
        }

        // --- 5. छुट्टी (Leave/Holiday) ---
        function markLeave() {
            let { name, id } = getInputs();
            if(!name || !id) return alert("नाम और ID दोनों दर्ज करें!");
            if(attendanceDb[id]) return alert("इस ID का डेटा आज पहले ही बन चुका है।");

            let reason = prompt("छुट्टी का प्रकार लिखें (Leave / Week Off / Holiday):");
            if(reason) {
                attendanceDb[id] = {
                    name: name, id: id, statusText: reason,
                    inTime: "-", outTime: "-", workSecs: 0, breakSecs: 0, trainSecs: 0,
                    mode: "leave", isPunchedOut: true, photoIn: null, photoOut: null
                };
                saveData(); renderTable(); clearInputs();
            }
        }

        // --- कैमरा और सेल्फी प्रोसेसिंग ---
        async function openCamera() {
            document.getElementById('selfieModal').style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById("video").srcObject = stream;
            } catch (err) { alert("कैमरा चालू नहीं हो सका!"); document.getElementById('selfieModal').style.display='none'; }
        }

        function captureAndProceed() {
            let video = document.getElementById('video');
            let canvas = document.getElementById('canvas');
            let ctx = canvas.getContext('2d');
            
            // क्वालिटी कम और साइज़ छोटा ताकि PDF हैंग न हो
            canvas.width = 120; canvas.height = 120;
            let minSize = Math.min(video.videoWidth, video.videoHeight);
            ctx.drawImage(video, (video.videoWidth - minSize)/2, (video.videoHeight - minSize)/2, minSize, minSize, 0, 0, 120, 120);
            let base64Photo = canvas.toDataURL('image/jpeg', 0.6);

            if(stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('selfieModal').style.display = 'none';

            let { name } = getInputs();

            if(pendingAction === "in") {
                attendanceDb[pendingId] = {
                    name: name, id: pendingId, statusText: "Present",
                    inTime: new Date().toLocaleTimeString('hi-IN'), outTime: "-",
                    workSecs: 0, breakSecs: 0, trainSecs: 0,
                    mode: "work", isPunchedOut: false,
                    photoIn: base64Photo, photoOut: null
                };
                alert("पंच-इन सफल!");
            } 
            else if(pendingAction === "out") {
                attendanceDb[pendingId].isPunchedOut = true;
                attendanceDb[pendingId].mode = "none";
                attendanceDb[pendingId].outTime = new Date().toLocaleTimeString('hi-IN');
                attendanceDb[pendingId].photoOut = base64Photo;
                alert("पंच-आउट सफल!");
            }
            
            saveData(); renderTable(); clearInputs();
        }

        // --- जियो-फेंसिंग ---
        function startDeviceGeoTracking() {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    let lat = pos.coords.latitude; let lng = pos.coords.longitude;
                    
                    if(!deviceBaseLat || !deviceBaseLng) {
                        deviceBaseLat = lat; deviceBaseLng = lng;
                        localStorage.setItem('deviceBaseLat', lat); localStorage.setItem('deviceBaseLng', lng);
                    }
                    
                    let dist = calculateDistance(deviceBaseLat, deviceBaseLng, lat, lng);
                    let geoText = document.getElementById("geoText");
                    let statusBox = document.getElementById("statusBox");

                    if(dist <= 50) {
                        isDeviceWithin50m = true;
                        geoText.innerHTML = `<span style="color: green;">डिवाइस 50m वर्किंग ज़ोन के अंदर है</span>`;
                        statusBox.classList.remove('out-of-zone');
                    } else {
                        isDeviceWithin50m = false;
                        geoText.innerHTML = `<span style="color: #c62828;">डिवाइस ज़ोन से ${Math.round(dist)} मीटर बाहर है!</span>`;
                        statusBox.classList.add('out-of-zone');
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        // --- मास्टर टाइमर ---
        function startMasterTimer() {
            setInterval(() => {
                let updated = false;
                for(let id in attendanceDb) {
                    let emp = attendanceDb[id];
                    if(emp.isPunchedOut) continue; // आउट होने पर टाइमर बंद

                    if(emp.mode === "work" && isDeviceWithin50m) emp.workSecs++;
                    else if(emp.mode === "break") emp.breakSecs++;
                    else if(emp.mode === "train") emp.trainSecs++;
                    updated = true;
                }
                if(updated) { saveData(); renderTable(); }
            }, 1000);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveData() { localStorage.setItem(`attDB_${todayDate}`, JSON.stringify(attendanceDb)); }
        function formatTime(s) { return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

        // --- टेबल रेंडर (कलर्स और लॉजिक के साथ) ---
        function renderTable() {
            let tbody = document.getElementById("logTableBody");
            tbody.innerHTML = "";
            let count = 0;

            for(let id in attendanceDb) {
                count++;
                let emp = attendanceDb[id];
                let totalWorkSecs = emp.workSecs + emp.trainSecs;

                // 1. स्टेटस कलर लॉजिक (छुट्टी लाल, बाकी प्रेजेंट)
                let statusHtml = "Present";
                let isLeave = ["leave", "week off", "holiday"].some(v => emp.statusText.toLowerCase().includes(v));
                
                if(isLeave) {
                    statusHtml = `<span style="color:red; font-weight:bold;">${emp.statusText}</span>`;
                } else {
                    if(emp.mode === 'break') statusHtml = `Present<br><span class="badge badge-break">☕ On Break</span>`;
                    else if(emp.mode === 'train') statusHtml = `Present<br><span class="badge badge-train">💼 On Official Duty</span>`;
                }

                // 2. टाइम कलर लॉजिक (8 घंटे और 1 घंटे वाला)
                let breakColor = emp.breakSecs > 3600 ? "color: red; font-weight: bold;" : "color: inherit;";
                let workColor = totalWorkSecs >= 28800 ? "color: green; font-weight: bold;" : "color: red; font-weight: bold;";
                if(isLeave || totalWorkSecs === 0) workColor = "color: inherit;"; // छुट्टी वाले दिन टाइम काला रहेगा

                // 3. फोटो (PDF सपोर्टेड इनलाइन CSS के साथ)
                let pIn = emp.photoIn ? `<img src="${emp.photoIn}" style="width:55px; height:55px; border-radius:4px; border:1px solid #ccc; object-fit:cover;">` : '-';
                let pOut = emp.photoOut ? `<img src="${emp.photoOut}" style="width:55px; height:55px; border-radius:4px; border:1px solid #ccc; object-fit:cover;">` : '-';

                tbody.innerHTML += `<tr>
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${statusHtml}</td>
                    <td>${emp.inTime}</td>
                    <td>${emp.outTime}</td>
                    <td style="${breakColor}">${formatTime(emp.breakSecs)}</td>
                    <td>${formatTime(emp.trainSecs)}</td>
                    <td style="${workColor}">${formatTime(totalWorkSecs)}</td>
                    <td>${pIn}</td>
                    <td>${pOut}</td>
                </tr>`;
            }
            if(count === 0) tbody.innerHTML = `<tr><td colspan="10">कोई डेटा उपलब्ध नहीं है</td></tr>`;
        }

        // --- 📥 PDF और EXCEL डाउनलोड ---
        function downloadPDF() {
            let pass = prompt(`PDF डाउनलोड करने के लिए पासवर्ड डालें:`);
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");
            
            document.getElementById('pdfMonthHeader').style.display = 'block';
            let element = document.getElementById('exportArea');
            
            // html2pdf सेटिंग्स (फोटो के लिए बेहतरीन)
            let opt = {
                margin:       0.3,
                filename:     `Attendance_Log_${todayDate.replace(/\//g, '-')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // useCORS से फोटो आसानी से रेंडर होती हैं
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                document.getElementById('pdfMonthHeader').style.display = 'none';
            });
        }

        function downloadExcel() {
            let pass = prompt(`Excel डाउनलोड करने के लिए पासवर्ड डालें:`);
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");

            let csvContent = "data:text/csv;charset=utf-8,ID,Name,Status,In Time,Out Time,Break Time,Train Time,Total Working Hrs\n";
            for(let id in attendanceDb) {
                let emp = attendanceDb[id];
                let isLeave = ["leave", "week off", "holiday"].some(v => emp.statusText.toLowerCase().includes(v));
                let statusExcel = isLeave ? emp.statusText : "Present";
                
                let row = [
                    emp.id, emp.name, statusExcel, emp.inTime, emp.outTime,
                    formatTime(emp.breakSecs), formatTime(emp.trainSecs), formatTime(emp.workSecs + emp.trainSecs)
                ];
                csvContent += row.join(",") + "\n";
            }
            
            let link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Attendance_Log_${todayDate.replace(/\//g, '-')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
