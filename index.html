<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        
        .header { background: #1a237e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 5px 0; font-size: 22px; }
        .live-time { font-size: 16px; font-weight: bold; color: #ffeb3b; }
        
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 1100px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { padding: 10px; width: 30%; margin: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-in { background-color: #4CAF50; } .btn-in:hover { background-color: #45a049; }
        .btn-out { background-color: #f44336; } .btn-out:hover { background-color: #d32f2f; }
        .btn-train-start { background-color: #9C27B0; } .btn-train-end { background-color: #7B1FA2; }
        .btn-break-start { background-color: #FF9800; } .btn-break-end { background-color: #F57C00; }
        
        /* सेल्फी पॉप-अप */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; width: 320px; }
        video { width: 100%; border-radius: 8px; border: 3px solid #1a237e; margin-bottom: 10px; }
        canvas { display: none; }

        /* स्टेटस बॉक्स */
        .status-box { margin: 15px auto; padding: 10px; background: #e3f2fd; border: 2px solid #90caf9; border-radius: 6px; font-size: 18px; font-weight: bold; color: #0d47a1; max-width: 500px; transition: 0.3s; }
        .geo-text { display: block; margin-top: 5px; font-size: 14px; font-weight: normal; }
        .out-of-zone { background: #ffebee !important; border-color: #ef5350 !important; color: #c62828 !important; }

        /* टेबल डिज़ाइन */
        #exportArea { margin-top: 20px; background: white; padding: 10px; }
        .report-header { display: none; text-align: center; font-size: 20px; margin-bottom: 15px; color: #1a237e; font-weight: bold; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
        th { background-color: #1a237e; color: white; }
        .active-timer { font-weight: bold; color: red; } 
        
        /* सेल्फी इमेज और स्टेटस बैज */
        .table-selfie { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; display: inline-block; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; color: white; margin-top: 5px; font-weight: normal; }
        .badge-break { background-color: #F57C00; }
        .badge-train { background-color: #7B1FA2; }
        
        .export-btns { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn-pdf { background-color: #D32F2F; padding: 10px 20px; }
        .btn-excel { background-color: #2E7D32; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏢 Quality Education Attendance</h2>
        <div id="liveDateTime" class="live-time">लोड हो रहा है...</div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="empName" placeholder="कर्मचारी का नाम" required>
            <input type="text" id="empId" placeholder="एम्प्लॉई ID" required>
        </div>

        <div class="status-box" id="statusBox">
            स्टेटस: <span id="currentStatus">Not Punched In</span>
            <span class="geo-text" id="geoText"></span>
        </div>

        <div class="btn-grid">
            <button class="btn-in" id="btnIn" onclick="initPunchIn()">Punch In</button>
            <button class="btn-out" id="btnOut" onclick="initPunchOut()" disabled>Punch Out</button>
            <button class="btn-break-start" id="btnBreakStart" onclick="startBreak()" disabled>Start Break ☕</button>
            <button class="btn-break-end" id="btnBreakEnd" onclick="endBreak()" disabled>End Break</button>
            <button class="btn-train-start" id="btnTrainStart" onclick="startTraining()" disabled>Start Training</button>
            <button class="btn-train-end" id="btnTrainEnd" onclick="endTraining()" disabled>End Training</button>
        </div>

        <div id="exportArea">
            <div class="report-header" id="pdfMonthHeader">Attendance Report</div>
            <div style="overflow-x: auto;">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>नाम</th>
                            <th>स्टेटस</th>
                            <th>In Time</th>
                            <th>Out Time</th>
                            <th>Break Time</th>
                            <th>Train Time</th>
                            <th>Total Work Hrs</th>
                            <th>In Selfie</th>
                            <th>Out Selfie</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <tr><td colspan="10">कोई डेटा उपलब्ध नहीं है</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="export-btns">
            <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
            <button class="btn-excel" onclick="downloadExcel()">Download Excel</button>
        </div>
    </div>

    <div id="selfieModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; color:#1a237e;">📍 लोकेशन कन्फर्म, सेल्फी लें</h3>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <button class="btn-in" style="width:100%;" onclick="captureAndProceed()">सेल्फी कैप्चर करें</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        let stream = null;
        let globalTimer = null;
        let geoWatchId = null;
        let pendingAction = ""; // 'in' या 'out'
        
        let todayDate = new Date().toLocaleDateString('en-IN');
        let currentMonthName = new Date().toLocaleString('en-IN', { month: 'long', year: 'numeric' });
        document.getElementById('pdfMonthHeader').innerText = `Attendance Report - ${currentMonthName}`;

        let sessionData = JSON.parse(localStorage.getItem('attendanceSession')) || null;

        window.onload = () => {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            
            if (sessionData && sessionData.date === todayDate) {
                document.getElementById("empName").value = sessionData.name;
                document.getElementById("empId").value = sessionData.id;
                renderTable();
                updateUIBasedOnState();
                if(sessionData.isActive) {
                    startMasterTimer();
                    startGeoTracking();
                }
            } else {
                sessionData = null; // पिछले दिन का डेटा रिसेट
            }
        };

        function updateDateTime() {
            const now = new Date();
            document.getElementById('liveDateTime').innerText = now.toLocaleString('hi-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' });
        }

        // --- पंच इन प्रोसेस ---
        function initPunchIn() {
            let name = document.getElementById("empName").value;
            let id = document.getElementById("empId").value;
            if(!name || !id) return alert("पहले नाम और एम्प्लॉई ID भरें!");

            // 1. चेक करें कि क्या आज इस ID से पहले ही पंच-इन हो चुका है
            let completedLogs = JSON.parse(localStorage.getItem(`logs_${todayDate}`)) || [];
            if(completedLogs.includes(id)) {
                return alert("इस एम्प्लॉई ID से आज का पंच-इन और पंच-आउट पहले ही पूरा हो चुका है!");
            }

            document.getElementById('currentStatus').innerText = "लोकेशन जांची जा रही है...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    window.tempLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    pendingAction = "in";
                    document.getElementById('modalTitle').innerText = "पंच-इन: सेल्फी कैप्चर करें";
                    openCamera();
                }, () => { alert("लोकेशन परमिशन अनिवार्य है!"); }, { enableHighAccuracy: true });
            } else { alert("लोकेशन सपोर्ट नहीं है!"); }
        }

        // --- पंच आउट प्रोसेस ---
        function initPunchOut() {
            if(!sessionData.isWithin50m) {
                return alert("अलर्ट: आप 50 मीटर ज़ोन से बाहर हैं! पंच-आउट केवल वर्किंग ज़ोन के अंदर से ही किया जा सकता है।");
            }
            pendingAction = "out";
            document.getElementById('modalTitle').innerText = "पंच-आउट: सेल्फी कैप्चर करें";
            openCamera();
        }

        // कैमरा खोलना
        async function openCamera() {
            document.getElementById('selfieModal').style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById("video").srcObject = stream;
            } catch (err) { alert("कैमरा चालू नहीं हो सका! परमिशन चेक करें।"); }
        }

        // फोटो खींचना और आगे बढ़ना
        function captureAndProceed() {
            let video = document.getElementById('video');
            let canvas = document.getElementById('canvas');
            let ctx = canvas.getContext('2d');
            
            // फोटो का साइज़ सेट करना ताकि डेटाबेस/मेमोरी न भरे
            canvas.width = 150; canvas.height = 150;
            
            // वीडियो का बीच का हिस्सा चौकोर में काटना
            let minSize = Math.min(video.videoWidth, video.videoHeight);
            let startX = (video.videoWidth - minSize) / 2;
            let startY = (video.videoHeight - minSize) / 2;
            ctx.drawImage(video, startX, startY, minSize, minSize, 0, 0, 150, 150);
            
            // फोटो को Base64 स्ट्रिंग में बदलना
            let base64Photo = canvas.toDataURL('image/jpeg', 0.8);

            // कैमरा बंद करना
            if(stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('selfieModal').style.display = 'none';

            if(pendingAction === "in") {
                // नया सेशन बनाना
                sessionData = {
                    date: todayDate, isActive: true, activeMode: "work",
                    name: document.getElementById("empName").value,
                    id: document.getElementById("empId").value,
                    punchInTime: new Date().toLocaleTimeString('hi-IN'),
                    punchOutTime: "-",
                    workSecs: 0, breakSecs: 0, trainSecs: 0,
                    baseLat: window.tempLocation.lat, baseLng: window.tempLocation.lng,
                    isWithin50m: true,
                    photoIn: base64Photo, photoOut: null // फोटो सेव की गई
                };
                startMasterTimer();
                startGeoTracking();
            } 
            else if(pendingAction === "out") {
                // सेशन क्लोज़ करना
                sessionData.isActive = false;
                sessionData.activeMode = "none";
                sessionData.punchOutTime = new Date().toLocaleTimeString('hi-IN');
                sessionData.photoOut = base64Photo; // पंच आउट फोटो सेव
                
                clearInterval(globalTimer);
                if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
                
                document.getElementById('geoText').innerHTML = "";
                document.getElementById('statusBox').classList.remove('out-of-zone');
                
                // आज के लिए इस ID को ब्लॉक लिस्ट (Completed) में डालना
                let completedLogs = JSON.parse(localStorage.getItem(`logs_${todayDate}`)) || [];
                completedLogs.push(sessionData.id);
                localStorage.setItem(`logs_${todayDate}`, JSON.stringify(completedLogs));
                
                alert("सफलतापूर्वक पंच-आउट हो गया!");
            }
            
            saveData(); renderTable(); updateUIBasedOnState();
        }

        // --- बटन्स (ब्रेक और ट्रेनिंग) ---
        function startBreak() { sessionData.activeMode = "break"; saveData(); renderTable(); updateUIBasedOnState(); }
        function endBreak() { sessionData.activeMode = "work"; saveData(); renderTable(); updateUIBasedOnState(); }
        
        function startTraining() {
            let pass = prompt("ट्रेनिंग शुरू करने के लिए एडमिन पासवर्ड डालें:");
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");
            sessionData.activeMode = "train"; saveData(); renderTable(); updateUIBasedOnState();
        }
        function endTraining() { sessionData.activeMode = "work"; saveData(); renderTable(); updateUIBasedOnState(); }

        // --- जियो ट्रैकिंग और टाइमर ---
        function startGeoTracking() {
            if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
            geoWatchId = navigator.geolocation.watchPosition((pos) => {
                if(!sessionData || !sessionData.isActive) return;
                let dist = calculateDistance(sessionData.baseLat, sessionData.baseLng, pos.coords.latitude, pos.coords.longitude);
                
                if(dist <= 50) {
                    sessionData.isWithin50m = true;
                    document.getElementById("geoText").innerHTML = `<span style="color: green;">You are within 50m working zone</span>`;
                    document.getElementById("statusBox").classList.remove('out-of-zone');
                } else {
                    sessionData.isWithin50m = false;
                    document.getElementById("geoText").innerHTML = `<span style="color: #c62828;">You are ${Math.round(dist)} meters away from working zone!</span>`;
                    document.getElementById("statusBox").classList.add('out-of-zone');
                }
                saveData();
            }, null, { enableHighAccuracy: true });
        }

        function startMasterTimer() {
            if(globalTimer) clearInterval(globalTimer);
            globalTimer = setInterval(() => {
                if(sessionData.activeMode === "work" && sessionData.isWithin50m) sessionData.workSecs++;
                else if(sessionData.activeMode === "break") sessionData.breakSecs++;
                else if(sessionData.activeMode === "train") sessionData.trainSecs++;
                
                saveData(); renderTable();
            }, 1000);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- टेबल और UI रेंडरिंग ---
        function saveData() { localStorage.setItem('attendanceSession', JSON.stringify(sessionData)); }

        function formatTime(totalSeconds) {
            let hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            let mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            let secs = String(totalSeconds % 60).padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        function renderTable() {
            if(!sessionData) return;
            
            // स्टेटस कॉलम का डिज़ाइन (Present के नीचे बॉक्स)
            let statusHtml = `Present`;
            let uiStatus = "Present";
            if(sessionData.activeMode === 'break') {
                statusHtml = `Present <br> <span class="badge badge-break">☕ On Break</span>`;
                uiStatus = "On Break ☕";
            } else if(sessionData.activeMode === 'train') {
                statusHtml = `Present <br> <span class="badge badge-train">💼 On Official Duty</span>`;
                uiStatus = "On Official Duty";
            } else if(!sessionData.isActive) {
                statusHtml = `Shift Ended`;
                uiStatus = "Shift Ended";
            }
            
            document.getElementById('currentStatus').innerText = uiStatus;

            let bClass = sessionData.activeMode === 'break' ? 'active-timer' : '';
            let tClass = sessionData.activeMode === 'train' ? 'active-timer' : '';
            let wClass = sessionData.activeMode === 'work' ? 'active-timer' : '';

            let totalWorkSecs = sessionData.workSecs + sessionData.trainSecs;

            // फोटो रेंडरिंग
            let photoInHtml = sessionData.photoIn ? `<img src="${sessionData.photoIn}" class="table-selfie">` : '-';
            let photoOutHtml = sessionData.photoOut ? `<img src="${sessionData.photoOut}" class="table-selfie">` : '-';

            let row = `<tr>
                <td>${sessionData.id}</td>
                <td>${sessionData.name}</td>
                <td style="font-weight:bold; color:#1a237e;">${statusHtml}</td>
                <td>${sessionData.punchInTime}</td>
                <td>${sessionData.punchOutTime}</td>
                <td class="${bClass}">${formatTime(sessionData.breakSecs)}</td>
                <td class="${tClass}">${formatTime(sessionData.trainSecs)}</td>
                <td class="${wClass}" style="background-color: #e8f5e9;">${formatTime(totalWorkSecs)}</td>
                <td>${photoInHtml}</td>
                <td>${photoOutHtml}</td>
            </tr>`;
            document.getElementById("logTableBody").innerHTML = row;
        }

        function updateUIBasedOnState() {
            if(!sessionData) return;
            let st = sessionData.activeMode;
            let isActive = sessionData.isActive;

            document.getElementById("empName").disabled = true;
            document.getElementById("empId").disabled = true;

            document.getElementById("btnIn").disabled = true; // एक बार अंदर आने पर ब्लॉक
            document.getElementById("btnOut").disabled = !isActive;
            
            document.getElementById("btnBreakStart").disabled = (!isActive || st !== "work");
            document.getElementById("btnBreakEnd").disabled = (!isActive || st !== "break");
            
            document.getElementById("btnTrainStart").disabled = (!isActive || st !== "work");
            document.getElementById("btnTrainEnd").disabled = (!isActive || st !== "train");
        }

        // --- 📥 PDF और Excel डाउनलोड लॉजिक ---

        function downloadPDF() {
            let pass = prompt(`PDF डाउनलोड करने के लिए पासवर्ड डालें:`);
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");
            
            // हेडिंग को विजिबल करना
            document.getElementById('pdfMonthHeader').style.display = 'block';
            
            let element = document.getElementById('exportArea');
            let opt = {
                margin:       0.5,
                filename:     `Attendance_${sessionData.name}_${todayDate.replace(/\//g, '-')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' } // लैंडस्केप ताकि टेबल पूरी आए
            };

            // PDF बनाने के बाद हेडिंग वापस छुपाना
            html2pdf().set(opt).from(element).save().then(() => {
                document.getElementById('pdfMonthHeader').style.display = 'none';
            });
        }

        function downloadExcel() {
            let pass = prompt(`Excel डाउनलोड करने के लिए पासवर्ड डालें:`);
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");

            if(!sessionData) return alert("कोई डेटा नहीं है!");

            // CSV फॉर्मेट तैयार करना (Excel में फोटो नहीं जाती, इसलिए सिर्फ डेटा)
            let totalWorkSecs = sessionData.workSecs + sessionData.trainSecs;
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID,Name,Date,Punch In,Punch Out,Break Time,Training Time,Total Working Hours\n";
            
            let rowData = [
                sessionData.id, sessionData.name, todayDate,
                sessionData.punchInTime, sessionData.punchOutTime,
                formatTime(sessionData.breakSecs), formatTime(sessionData.trainSecs), formatTime(totalWorkSecs)
            ];
            
            csvContent += rowData.join(",") + "\n";

            // डाउनलोड ट्रिगर करना
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Attendance_${sessionData.id}_${todayDate.replace(/\//g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
