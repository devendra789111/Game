<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        
        /* हेडर को छोटा और प्रोफेशनल किया गया है */
        .header { background: #1a237e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 5px 0; font-size: 22px; }
        .live-time { font-size: 16px; font-weight: bold; color: #ffeb3b; }
        
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 1000px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { padding: 10px; width: 30%; margin: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        /* अलग-अलग बटन्स का डिज़ाइन */
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-in { background-color: #4CAF50; } .btn-in:hover { background-color: #45a049; }
        .btn-out { background-color: #f44336; } .btn-out:hover { background-color: #d32f2f; }
        .btn-train-start { background-color: #9C27B0; } .btn-train-end { background-color: #7B1FA2; }
        .btn-break-start { background-color: #FF9800; } .btn-break-end { background-color: #F57C00; }
        
        #cameraBox { display: none; margin: 15px auto; padding: 15px; background: #fff3e0; border: 2px dashed #ff9800; border-radius: 10px; }
        video { width: 100%; max-width: 250px; border-radius: 10px; border: 3px solid #1a237e; }
        
        /* स्टेटस बॉक्स को छोटा किया गया है */
        .status-box { margin: 15px 0; padding: 10px; background: #e3f2fd; border: 1px solid #90caf9; border-radius: 6px; font-size: 18px; font-weight: bold; color: #0d47a1; }

        /* टेबल डिज़ाइन - एक ही लाइन में सब कुछ */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #1a237e; color: white; }
        .active-timer { font-weight: bold; color: red; } /* जो टाइमर चल रहा होगा वो लाल दिखेगा */
        
        .export-btns { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn-pdf { background-color: #D32F2F; padding: 10px 20px; }
        .btn-excel { background-color: #2E7D32; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏢 Quality Education Attendance</h2>
        <div id="liveDateTime" class="live-time">लोड हो रहा है...</div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="empName" placeholder="कर्मचारी का नाम" required>
            <input type="text" id="empId" placeholder="एम्प्लॉई ID" required>
        </div>

        <div class="status-box" id="statusBox">
            स्टेटस: <span id="currentStatus">Not Punched In</span>
        </div>

        <div id="cameraBox">
            <p style="color:#d84315; font-weight:bold; margin-top:0;">📍 लोकेशन वेरीफाई हो गई है। कृपया सेल्फी लें।</p>
            <video id="video" autoplay playsinline></video><br>
            <button class="btn-in" style="margin-top: 10px;" onclick="takePhotoAndPunch()">सेल्फी कैप्चर करें और कन्फर्म करें</button>
        </div>

        <div class="btn-grid">
            <button class="btn-in" id="btnIn" onclick="initPunchIn()">Punch In</button>
            <button class="btn-out" id="btnOut" onclick="initPunchOut()" disabled>Punch Out</button>
            <button class="btn-break-start" id="btnBreakStart" onclick="startBreak()" disabled>Start Break ☕</button>
            <button class="btn-break-end" id="btnBreakEnd" onclick="endBreak()" disabled>End Break</button>
            <button class="btn-train-start" id="btnTrainStart" onclick="startTraining()" disabled>Start Training</button>
            <button class="btn-train-end" id="btnTrainEnd" onclick="endTraining()" disabled>End Training</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>नाम</th>
                        <th>ID</th>
                        <th>स्टेटस</th>
                        <th>Punch In</th>
                        <th>Punch Out</th>
                        <th>Work Hrs</th>
                        <th>Break Time</th>
                        <th>Train Time</th>
                        <th>Selfie</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    </tbody>
            </table>
        </div>

        <div class="export-btns">
            <button class="btn-pdf" onclick="downloadFile('PDF')">Download PDF</button>
            <button class="btn-excel" onclick="downloadFile('Excel')">Download Excel</button>
        </div>
    </div>

    <script>
        // --- सिस्टम वेरिएबल्स ---
        const ADMIN_PASS = "1234";
        let stream = null;
        let globalTimer = null;
        
        // --- लोकल स्टोरेज से डेटा रिकवर करना (Refresh-proof) ---
        let sessionData = JSON.parse(localStorage.getItem('attendanceSession')) || null;

        window.onload = () => {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            
            if (sessionData && sessionData.isActive) {
                document.getElementById("empName").value = sessionData.name;
                document.getElementById("empId").value = sessionData.id;
                renderTable();
                updateUIBasedOnState();
                startMasterTimer();
            }
        };

        function updateDateTime() {
            const now = new Date();
            document.getElementById('liveDateTime').innerText = now.toLocaleString('hi-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' });
        }

        // --- 1. पंच इन प्रोसेस (पहले लोकेशन, फिर कैमरा) ---
        function initPunchIn() {
            let name = document.getElementById("empName").value;
            let id = document.getElementById("empId").value;
            if(!name || !id) return alert("पहले नाम और एम्प्लॉई ID भरें!");

            document.getElementById('currentStatus').innerText = "लोकेशन जांची जा रही है...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    // लोकेशन मिल गई, अब कैमरा खोलें
                    document.getElementById('currentStatus').innerText = "लोकेशन वेरीफाईड। सेल्फी पेंडिंग...";
                    document.getElementById("cameraBox").style.display = "block";
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                        document.getElementById("video").srcObject = stream;
                    } catch (err) { alert("कैमरा चालू नहीं हो सका!"); }
                }, () => { alert("लोकेशन परमिशन अनिवार्य है!"); }, { enableHighAccuracy: true });
            } else { alert("लोकेशन सपोर्ट नहीं है!"); }
        }

        function takePhotoAndPunch() {
            if(stream) stream.getTracks().forEach(track => track.stop()); // कैमरा बंद करें
            document.getElementById("cameraBox").style.display = "none";
            
            // नया सेशन बनाना
            sessionData = {
                isActive: true,
                name: document.getElementById("empName").value,
                id: document.getElementById("empId").value,
                status: "Present",
                punchInTime: new Date().toLocaleTimeString('hi-IN'),
                punchOutTime: "-",
                workSecs: 0, breakSecs: 0, trainSecs: 0,
                activeMode: "work" // work, break, train
            };
            
            saveData();
            renderTable();
            updateUIBasedOnState();
            startMasterTimer();
        }

        // --- 2. पंच आउट ---
        function initPunchOut() {
            sessionData.isActive = false;
            sessionData.activeMode = "none";
            sessionData.status = "Shift Ended";
            sessionData.punchOutTime = new Date().toLocaleTimeString('hi-IN');
            
            clearInterval(globalTimer);
            saveData();
            renderTable();
            updateUIBasedOnState();
            alert("सफलतापूर्वक पंच-आउट हो गया!");
        }

        // --- 3. ब्रेक सिस्टम ---
        function startBreak() {
            sessionData.activeMode = "break";
            sessionData.status = "On Break ☕";
            saveData(); renderTable(); updateUIBasedOnState();
        }
        function endBreak() {
            sessionData.activeMode = "work";
            sessionData.status = "Present";
            saveData(); renderTable(); updateUIBasedOnState();
        }

        // --- 4. ट्रेनिंग सिस्टम ---
        function startTraining() {
            let pass = prompt("ट्रेनिंग शुरू करने के लिए एडमिन पासवर्ड डालें:");
            if(pass !== ADMIN_PASS) return alert("पासवर्ड गलत है!");
            
            sessionData.activeMode = "train";
            sessionData.status = "On Official Duty";
            saveData(); renderTable(); updateUIBasedOnState();
        }
        function endTraining() {
            sessionData.activeMode = "work";
            sessionData.status = "Present";
            saveData(); renderTable(); updateUIBasedOnState();
        }

        // --- 5. मास्टर टाइमर (लगातार चलता रहेगा और UI अपडेट करेगा) ---
        function startMasterTimer() {
            if(globalTimer) clearInterval(globalTimer);
            globalTimer = setInterval(() => {
                if(sessionData.activeMode === "work") sessionData.workSecs++;
                else if(sessionData.activeMode === "break") sessionData.breakSecs++;
                else if(sessionData.activeMode === "train") sessionData.trainSecs++;
                
                saveData(); // हर सेकंड लोकल स्टोरेज में सेव ताकि रिफ्रेश पर उड़े नहीं
                renderTable(); // टेबल में लाइव टाइमर अपडेट
            }, 1000);
        }

        // --- 6. UI और टेबल अपडेट फंक्शन्स ---
        function saveData() { localStorage.setItem('attendanceSession', JSON.stringify(sessionData)); }

        function formatTime(totalSeconds) {
            let hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            let mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            let secs = String(totalSeconds % 60).padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        function renderTable() {
            if(!sessionData) return;
            document.getElementById('currentStatus').innerText = sessionData.status;

            // जो टाइमर चल रहा है उसे लाल (active-timer) क्लास देना
            let wClass = sessionData.activeMode === 'work' ? 'active-timer' : '';
            let bClass = sessionData.activeMode === 'break' ? 'active-timer' : '';
            let tClass = sessionData.activeMode === 'train' ? 'active-timer' : '';

            let row = `<tr>
                <td>${sessionData.name}</td>
                <td>${sessionData.id}</td>
                <td style="font-weight:bold; color:#1a237e;">${sessionData.status}</td>
                <td>${sessionData.punchInTime}</td>
                <td>${sessionData.punchOutTime}</td>
                <td class="${wClass}">${formatTime(sessionData.workSecs)}</td>
                <td class="${bClass}">${formatTime(sessionData.breakSecs)}</td>
                <td class="${tClass}">${formatTime(sessionData.trainSecs)}</td>
                <td>📸 Done</td>
            </tr>`;
            document.getElementById("logTableBody").innerHTML = row;
        }

        function updateUIBasedOnState() {
            if(!sessionData) return;
            let st = sessionData.activeMode;
            let isActive = sessionData.isActive;

            // नाम और ID बॉक्स लॉक कर दें
            document.getElementById("empName").disabled = isActive;
            document.getElementById("empId").disabled = isActive;

            // बटन एनेबल/डिसेबल लॉजिक
            document.getElementById("btnIn").disabled = isActive;
            document.getElementById("btnOut").disabled = !isActive;
            
            document.getElementById("btnBreakStart").disabled = (!isActive || st !== "work");
            document.getElementById("btnBreakEnd").disabled = (!isActive || st !== "break");
            
            document.getElementById("btnTrainStart").disabled = (!isActive || st !== "work");
            document.getElementById("btnTrainEnd").disabled = (!isActive || st !== "train");
        }

        // --- 7. डाउनलोड फंक्शन्स ---
        function downloadFile(type) {
            let pass = prompt(`${type} डाउनलोड करने के लिए पासवर्ड डालें:`);
            if(pass === "admin123") {
                alert(`आपकी ${type} फाइल डाउनलोड हो रही है...`);
            } else {
                alert("पासवर्ड गलत है!");
            }
        }
    </script>
</body>
</html>
